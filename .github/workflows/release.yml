name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    name: Build, Test, and Publish

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest -q

      - name: Run linters
        run: |
          poetry run ruff check vidgrab/
          poetry run pylint vidgrab/ || true
          poetry run mypy vidgrab/ || true

      - name: Build distribution
        run: poetry build

      - name: Publish to PyPI
        run: poetry publish
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_TOKEN }}

      - name: Extract changelog
        id: changelog
        run: |
          version="${GITHUB_REF_NAME}"
          notes=$(awk "/^## \[${version}\]/{found=1; next} found && /^## \[/{exit} found{print}" docs/CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$notes" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pass notes via env (not inline ${{ }}) so backticks/$() in the
          # changelog are never re-evaluated by the shell.
          NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "$NOTES" \
            dist/vidgrab-*.whl dist/vidgrab-*.tar.gz
